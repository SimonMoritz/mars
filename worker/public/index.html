<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frames From Mars — NASA Mars Photo Archive</title>
<meta name="description" content="A fullscreen viewer for Mars photographs from the NASA image archive. Discover rover and orbiter imagery one transmission at a time.">
<link rel="canonical" href="https://framesfrommars.com/">
<meta property="og:type" content="website">
<meta property="og:url" content="https://framesfrommars.com/">
<meta property="og:title" content="Frames From Mars — NASA Mars Photo Archive">
<meta property="og:description" content="A fullscreen viewer for Mars photographs from the NASA image archive. Discover rover and orbiter imagery one transmission at a time.">
<meta property="og:image" content="https://framesfrommars.com/favicon-framesfrommars.svg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Frames From Mars — NASA Mars Photo Archive">
<meta name="twitter:description" content="A fullscreen viewer for Mars photographs from the NASA image archive. Discover rover and orbiter imagery one transmission at a time.">
<meta name="twitter:image" content="https://framesfrommars.com/favicon-framesfrommars.svg">
<link rel="icon" type="image/svg+xml" href="/favicon-framesfrommars.svg">
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Frames From Mars",
  "alternateName": "Mars Transmission",
  "url": "https://framesfrommars.com/",
  "description": "A fullscreen viewer for Mars photographs from the NASA image archive. Browse imagery from rovers, landers, and orbiters one transmission at a time."
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@300;400;500;700&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<div class="app">

  <header class="brand">
    <h1 class="brand-title">Mars Transmission</h1>
    <p class="brand-tagline">NASA Mars images — rovers, orbiters, surface science</p>
    <div class="brand-subtitle"><span>Image Credit: NASA</span></div>
  </header>

  <div class="photo-viewport" id="viewport">
    <img id="photo" alt="Mars photograph from the NASA archive" />
  </div>

  <div class="scan-effect" id="scanEffect"></div>

  <div class="description-panel" id="descriptionPanel" aria-hidden="true">
    <div class="description-label">NASA Archive Description</div>
    <p class="photo-description" id="description"></p>
    <a class="full-image-link" id="fullImageLink" href="#" target="_blank" rel="noopener">
      <span aria-hidden="true">&#x2197;</span> View Full Image
    </a>
  </div>

  <div class="photo-overlay" id="overlay">
    <button class="overlay-toggle" id="overlayToggle" aria-label="Show description" aria-expanded="false" aria-controls="descriptionPanel">
      <span class="overlay-toggle-icon" aria-hidden="true">&#x2191;</span>
    </button>
    <div class="photo-meta-row">
      <div class="photo-meta">
        <div class="rover-name" id="roverName"></div>
        <div class="camera-name" id="cameraName"></div>
      </div>
      <div class="photo-data">
        <div class="data-row">
          <span class="data-label">CENTER</span>
          <span class="data-value" id="solValue"></span>
        </div>
        <div class="data-row">
          <span class="data-label">DATE</span>
          <span class="data-value" id="dateValue"></span>
        </div>
        <div class="data-row">
          <span class="data-label">NASA ID</span>
          <span class="data-value" id="idValue"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="explore-btn" id="exploreBtn">New Transmission</button>
    <div class="photo-count" id="photoCount"></div>
  </div>

  <div class="loading-state" id="loadingState">
    <div class="loading-ring"></div>
    <div class="loading-text">
      Searching archive for<br>
      <span class="loading-rover" id="loadingRover">MARS ROVER</span>
    </div>
  </div>

  <div class="error-state" id="errorState">
    <div class="error-icon">&#x25C7;</div>
    <div class="error-msg" id="errorMsg">Transmission lost. Retrying uplink.</div>
  </div>

</div>

<script type="module" src="/js/main.js"></script>
</body>
</html>
